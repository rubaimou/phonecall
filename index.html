<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Web Call & Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f9; display: flex; justify-content: center; }
        .container { max-width: 450px; width: 100%; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input, button { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #0056b3; }
        #hangup-btn { background: #dc3545; display: none; }
        #qrcode { display: flex; justify-content: center; margin: 15px 0; }
        
        /* Chat UI Styling */
        #chat-box { border: 1px solid #ddd; height: 150px; overflow-y: scroll; text-align: left; padding: 10px; margin-top: 15px; background: #fafafa; border-radius: 4px; display: none;}
        .msg { margin: 4px 0; padding: 6px; border-radius: 4px; max-width: 80%; font-size: 14px;}
        .msg.me { background: #e1ffc7; margin-left: auto; text-align: right; }
        .msg.them { background: #fff; border: 1px solid #eee; }
        #msg-input-container { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Free Call & Live Chat</h2>
    
    <div>
        <p>Your Call ID:</p>
        <h3 id="my-id">Generating ID...</h3>
        <div id="qrcode"></div>
        <p style="font-size:12px; color:#777;">Scan QR code with a phone to copy this ID link instantly</p>
    </div>

    <hr>

    <input type="text" id="remote-id" placeholder="Paste Friend's Call ID here" />
    <button id="call-btn">Start Call & Chat</button>
    <button id="hangup-btn">End Call</button>
    <div id="status-text" style="font-style:italic; color:#666; margin: 10px 0;">Status: Disconnected</div>

    <div id="chat-box"></div>
    <div id="msg-input-container">
        <input type="text" id="msg-input" placeholder="Type a message here..." />
        <button id="send-btn" style="background:#28a745;">Send Message</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
